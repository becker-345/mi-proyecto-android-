# custom aapt2 execute location
# android.aapt2FromMavenOverride=/usr/bin/aapt2

# Configuraciones base de Android
android.useAndroidX=true
android.enableJetifier=true

# --- ACELERADORES DE COMPILACIÓN (MÁXIMA VELOCIDAD PARA LA NUBE) ---

# 1. Asignar 4GB de RAM y recolector de basura en paralelo para mayor fluidez
org.gradle.jvmargs=-Xmx4096m -XX:+UseParallelGC -Dfile.encoding=UTF-8

# 2. Ejecutar tareas al mismo tiempo (aprovecha todos los núcleos del servidor)
org.gradle.parallel=true

# 3. Caché de construcción (Solo compila lo que modificaste, ignora lo demás)
org.gradle.caching=true

# 4. Caché de configuración (Salta la fase de preparación de Gradle, ahorra ~30 segundos)
org.gradle.configuration-cache=true

# 5. Aceleradores nativos de Kotlin
kotlin.caching.enabled=true
kotlin.parallel.tasks.in.project=true
